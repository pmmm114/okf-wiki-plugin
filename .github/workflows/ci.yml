# CI 골격 (T-P3-1) — 자기 번들(.okf) 검증 포함. 픽스처 스위트·오라클 차동·
# 라이선스 검사 스텝은 T-P3-2/3/5에서 추가한다. job 이름 `core`는 브랜치 룰셋의
# required status check 컨텍스트로 쓰이므로 변경 금지.
name: ci
on: [push, pull_request]
jobs:
  core:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
      - name: 자기 번들 검증 (.okf)
        run: uv run --project okf-core okf validate .okf --strict
      - name: JSON 스텁 파싱 검사
        run: |
          python3 -m json.tool .claude-plugin/marketplace.json > /dev/null
          python3 -m json.tool plugins/okf/.claude-plugin/plugin.json > /dev/null
          python3 -m json.tool plugins/okf/hooks/hooks.json > /dev/null
          python3 -m json.tool okf-core/vendor/vendor.lock > /dev/null
          python3 -m json.tool okf-core/src/okf_core/rules/v0_1.json > /dev/null
      - name: okf-core 빌드
        run: |
          cd okf-core
          uv build
      - name: 테스트
        run: uv run --with pytest --with pyyaml python -m pytest okf-core/tests -q
      - name: 픽스처 스위트
        run: uv run --with pyyaml python okf-core/scripts/run_fixture_suite.py
      - name: vendor 동기화 검사
        run: python3 okf-core/scripts/vendor_sync_check.py
